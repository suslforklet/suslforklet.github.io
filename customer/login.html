<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Smart Digital Canteen</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- 
        Customer Login Page
        Customers can login to place orders and track their food
    -->

    <div class="auth-container" style="background: url('../assets/customer-login-bg.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat; ">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title"
                    style="font-weight:bold;font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">
                    Customer Login</h1>
                <p class="auth-subtitle">Login to order delicious food</p>
            </div>

            <!-- Login Form -->
            <form id="customerLoginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="Enter your email"
                        style="border-radius: 15px;" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter your password"
                        style="border-radius: 15px;" required>
                </div>

                <button type="submit" class="btn btn-customer-primary btn-block btn-lg" margin-top="5px"
                    style="background-color: #cd5f08;border-radius: 25px;">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" style="color:#cd5f08 ;">Register here</a></p>
                <p style="margin-top: 0.5rem;">
                    <a href="landing.html" style="color:#cd5f08">← Back to Home</a>
                </p>
            </div>


        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Initialize login form for customer role
        document.addEventListener('DOMContentLoaded', () => {
            setupLoginForm('customerLoginForm', USER_ROLES.CUSTOMER);

            // Check if already logged in
            const currentUser = getCurrentUser();
            if (currentUser && currentUser.role === USER_ROLES.CUSTOMER) {
                navigateTo('landing.html');
            }
        });
    </script>
</body>

</html>
