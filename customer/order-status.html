<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status - Smart Digital Canteen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
    <!-- 
        Order Status Page
        Shows order token and real-time status tracking
    -->
    
    <!-- Navigation Bar - Fixed at Top -->
    <nav class="navbar navbar-customer">
        <div class="container flex-between">
            <a href="landing.html" class="navbar-brand">
                <img src="../assets/customer_landing/logo1.jpeg" alt="SUSL Forklet Logo">
            </a>

            <button class="navbar-toggle" aria-label="Toggle navigation" id="navbarToggle">☰</button>

            <ul class="navbar-nav" id="navbarMenu">
                <li><a href="landing.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="cart.html" class="nav-link cart-badge">
                    🛒 Cart <span class="cart-count">0</span>
                </a></li>
                <li><a href="order-history.html" class="nav-link">My Orders</a></li>
                <li id="userNav">
                    <a href="login.html" class="nav-link">Login</a>
                </li>
            </ul>
        </div>
    </nav>
    
    <!-- Page Header -->
    <section class="page-header" style="background: linear-gradient(135deg, #cd5f08 0%, #a34d06 100%);">
        <div class="container">
            <h1 class="page-header-title">Order Status 📋</h1>
            <p class="page-header-subtitle">Track your order in real-time</p>
        </div>
    </section>
    
    <!-- Order Status Section -->
    <section class="customer-section">
        <div class="customer-container">
            <div id="orderStatusContainer">
                <!-- Order status will be loaded here -->
                <div class="text-center">
                    <div class="loading-spinner" style="margin: 2rem auto;"></div>
                    <p>Loading order details...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Files -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/orders.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Update navigation
            updateNavigation();
            
            // Mobile navbar toggle
            setupMobileNavbarToggle();
            
            // Get token from URL
            const token = getUrlParam('token');
            
            if (token) {
                renderOrderStatus(token);
                
                // Auto-refresh status every 10 seconds
                setInterval(() => {
                    renderOrderStatus(token);
                }, 10000);
            } else {
                document.getElementById('orderStatusContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3 class="empty-state-title">No order token provided</h3>
                        <p class="empty-state-text">Please check your order history or place a new order</p>
                        <a href="order-history.html" class="btn btn-customer-primary">View Order History</a>
                    </div>
                `;
            }
            
            // Update cart badge
            updateCartBadge();
        });
        
        /**
         * Update navigation based on user login status
         */
        function updateNavigation() {
            const currentUser = getCurrentUser();
            const userNav = document.getElementById('userNav');
            
            if (currentUser && currentUser.role === USER_ROLES.CUSTOMER) {
                userNav.innerHTML = `
                    <div class="flex gap-sm" style="align-items: center;">
                        <span class="nav-link">👤 <span class="user-name">${currentUser.name}</span></span>
                        <a href="#" class="nav-link logout-btn" style="color: var(--danger);">Logout</a>
                    </div>
                `;
                setupLogoutButton();
            }
        }

        /**
         * Mobile navbar toggle functionality
         */
        function setupMobileNavbarToggle() {
            const navbarToggle = document.getElementById('navbarToggle');
            const navbarMenu = document.getElementById('navbarMenu');

            if (navbarToggle) {
                navbarToggle.addEventListener('click', () => {
                    navbarMenu.classList.toggle('active');
                });
            }

            // Close menu when clicking on a link
            const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navbarMenu.classList.remove('active');
                });
            });
        }
    </script>
</body>
</html>
