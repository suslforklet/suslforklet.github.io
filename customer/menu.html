<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Smart Digital Canteen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>

    <!-- Navigation Bar - Fixed at Top - With Black Background & White Text -->
    <nav class="navbar navbar-customer">
        <div class="container flex-between">
            <a href="landing.html" class="navbar-brand">
                <img src="../assets/customer_landing/logo1.jpeg" alt="SUSL Forklet Logo">
            </a>

            <button class="navbar-toggle" aria-label="Toggle navigation" id="navbarToggle">☰</button>

            <ul class="navbar-nav" id="navbarMenu">
                <li><a href="landing.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link active">Menu</a></li>
                <li><a href="cart.html" class="nav-link cart-badge">
                    🛒 Cart <span class="cart-count">0</span>
                </a></li>
                <li><a href="order-history.html" class="nav-link">My Orders</a></li>
                <li id="userNav">
                    <a href="login.html" class="nav-link">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header" style="background: linear-gradient(135deg, #cd5f08 0%, #a34d06 100%);">
        <div class="container">
            <h1 class="page-header-title">Our Menu 🍔</h1>
            <p class="page-header-subtitle">Choose from our delicious selection</p>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="customer-section">
        <div class="customer-container">
            <!-- Search -->
            <div class="search-section" style="margin-bottom: 2rem;">
                <div class="search-bar" style="max-width: 400px;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input"
                           placeholder="Search for food...">
                </div>
            </div>

            <!-- Fixed Categories Wrapper -->
            <div class="category-filters-wrapper">
                <!-- Categories -->
                <div class="category-filters" id="categoryFilters"></div>
            </div>

            <!-- Menu Grid -->
            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </section>

    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" aria-label="Scroll to top" title="Back to top">⬆</button>

    <!-- JavaScript Files -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/cart.js"></script>

    <!-- Page Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Update navigation
            updateNavigation();

            // Load menu content
            renderCategoryFilters('categoryFilters');
            renderMenuGrid('menuGrid');

            setupCategoryFilters('categoryFilters', 'menuGrid');
            setupMenuSearch('searchInput', 'menuGrid');
            setupAddToCartButtons();

            updateCartBadge();

            // Mobile navbar toggle
            setupMobileNavbarToggle();

            // Scroll to top button functionality
            setupScrollToTopButton();
        });

        function updateNavigation() {
            const currentUser = getCurrentUser();
            const userNav = document.getElementById('userNav');

            if (currentUser && currentUser.role === USER_ROLES.CUSTOMER) {
                userNav.innerHTML = `
                    <div class="flex gap-sm" style="align-items: center;">
                        <span class="nav-link">
                            👤 <span class="user-name">${currentUser.name}</span>
                        </span>
                        <a href="#" class="nav-link logout-btn" style="color: #f44336;">
                            Logout
                        </a>
                    </div>
                `;
                setupLogoutButton();
            }
        }

        // Mobile navbar toggle functionality
        function setupMobileNavbarToggle() {
            const navbarToggle = document.getElementById('navbarToggle');
            const navbarMenu = document.getElementById('navbarMenu');

            if (navbarToggle) {
                navbarToggle.addEventListener('click', () => {
                    navbarMenu.classList.toggle('active');
                });
            }

            // Close menu when clicking on a link
            const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navbarMenu.classList.remove('active');
                });
            });
        }

        // Scroll to top button functionality
        function setupScrollToTopButton() {
            const scrollTopBtn = document.getElementById('scrollTopBtn');

            if (!scrollTopBtn) return;

            // Show/hide button on scroll
            window.addEventListener('scroll', () => {
                // Show button when scrolled 300px down
                if (window.scrollY > 300) {
                    scrollTopBtn.classList.add('show');
                } else {
                    scrollTopBtn.classList.remove('show');
                }
            });

            // Scroll to top on button click
            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // Also handle keyboard shortcut (Home key)
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Home') {
                    event.preventDefault();
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                }
            });
        }
    </script>
</body>
</html>
