<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Smart Digital Canteen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
    <!-- 
        Customer Cart Page
        Review cart items, modify quantities, and place order
    -->
    
    <!-- Navigation Bar - With Black Background & White Text -->
    <nav class="navbar navbar-customer" style="background-color: #000000;">
        <div class="container flex-between">
            <a href="landing.html" class="navbar-brand">
                <img src="../assets/customer_landing/logo1.jpeg" alt="SUSL Forklet Logo">
            </a>
            
            <button class="navbar-toggle" aria-label="Toggle navigation" style="color: #ffffff;">☰</button>
            
            <ul class="navbar-nav">
                <li><a href="landing.html" class="nav-link" style="color: #ffffff;">Home</a></li>
                <li><a href="menu.html" class="nav-link" style="color: #ffffff;">Menu</a></li>
                <li><a href="cart.html" class="nav-link active cart-badge" style="color: #ffffff;">
                    🛒 Cart <span class="cart-count">0</span>
                </a></li>
                <li><a href="order-history.html" class="nav-link" style="color: #ffffff;">My Orders</a></li>
                <li id="userNav">
                    <a href="login.html" class="nav-link" style="color: #ffffff;">Login</a>
                </li>
            </ul>
        </div>
    </nav>
    
    <!-- Page Header -->
    <section class="page-header" style="background: linear-gradient(135deg, #cd5f08 0%, #a34d06 100%);">
        <div class="container">
            <h1 class="page-header-title">Your Cart 🛒</h1>
            <p class="page-header-subtitle">Review your items before ordering</p>
        </div>
    </section>
    
    <!-- Cart Section -->
    <section class="page-section">
        <div class="container">
            <div class="cart-container">
                <div class="flex gap-lg" style="flex-wrap: wrap;">
                    <!-- Cart Items -->
                    <div style="flex: 2; min-width: 300px;">
                        <h3 class="mb-md">Cart Items</h3>
                        <div id="cartItems">
                            <!-- Cart items will be loaded here -->
                        </div>
                    </div>
                    
                    <!-- Cart Summary -->
                    <div style="flex: 1; min-width: 280px;">
                        <div id="cartSummary">
                            <!-- Cart summary will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Files -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/orders.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Update navigation
            updateNavigation();
            
            // Initialize cart page
            initCartPage();
        });
        
        /**
         * Update navigation based on user login status
         */
        function updateNavigation() {
            const currentUser = getCurrentUser();
            const userNav = document.getElementById('userNav');
            
            if (currentUser && currentUser.role === USER_ROLES.CUSTOMER) {
                userNav.innerHTML = `
                    <div class="flex gap-sm" style="align-items: center;">
                        <span class="nav-link">👤 <span class="user-name">${currentUser.name}</span></span>
                        <a href="#" class="nav-link logout-btn" style="color: var(--danger);">Logout</a>
                    </div>
                `;
                setupLogoutButton();
            }
        }
    </script>
</body>
</html>
